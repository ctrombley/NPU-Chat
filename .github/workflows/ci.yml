name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: make lint-frontend

      - name: Test
        run: make test-frontend

  build-validation:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build

      - name: Build Docker image
        run: docker build -t npuchat:ci .

      - name: Smoke test health endpoint
        run: |
          docker run -d --name npuchat-ci -p 1314:1314 npuchat:ci
          sleep 5
          curl -f http://localhost:1314/api/health || (docker logs npuchat-ci && exit 1)
          docker stop npuchat-ci
          docker rm npuchat-ci
